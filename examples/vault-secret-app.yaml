# Exemplo de app que busca secrets do HashiCorp Vault
#
# Fluxo:
#   1. Init container autentica no Vault usando o token do ServiceAccount (k8s auth method)
#   2. Busca os secrets em secret/k8s-provisioner/api-keys
#   3. Escreve em /vault/secrets/ (volume emptyDir em memória)
#   4. Container principal lê os secrets do volume
#
# Deploy:
#   kubectl apply -f examples/vault-secret-app.yaml
#
# Verificar:
#   kubectl logs -l app=vault-demo -c app
#   kubectl exec -it deploy/vault-demo-app -- cat /vault/secrets/api-keys.json

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-demo
  namespace: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-demo-app
  namespace: default
  labels:
    app: vault-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-demo
  template:
    metadata:
      labels:
        app: vault-demo
    spec:
      serviceAccountName: vault-demo

      initContainers:
      - name: vault-fetch-secrets
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          VAULT_ADDR="http://192.168.56.20:8200"
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

          echo "[vault-init] Autenticando no Vault via Kubernetes auth..."
          RESPONSE=$(curl -sf -X POST \
            "$VAULT_ADDR/v1/auth/kubernetes/login" \
            -H "Content-Type: application/json" \
            -d "{\"role\":\"k8s-provisioner\",\"jwt\":\"$SA_TOKEN\"}")

          VAULT_TOKEN=$(echo "$RESPONSE" \
            | grep -o '"client_token":"[^"]*"' \
            | head -1 \
            | cut -d'"' -f4)

          if [ -z "$VAULT_TOKEN" ]; then
            echo "[vault-init] ERRO: falha ao obter token do Vault"
            echo "[vault-init] Resposta: $RESPONSE"
            exit 1
          fi

          echo "[vault-init] Token obtido. Buscando secrets..."
          curl -sf \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/k8s-provisioner/api-keys" \
            -o /vault/secrets/api-keys.json

          echo "[vault-init] Secrets salvos em /vault/secrets/api-keys.json"
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets

      containers:
      - name: app
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "==============================="
          echo "  Vault Demo App"
          echo "==============================="
          echo ""
          echo "Secrets carregados do Vault:"
          echo ""
          cat /vault/secrets/api-keys.json
          echo ""
          echo "==============================="
          echo "App em execução..."
          sleep infinity
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 64Mi
            cpu: 50m

      volumes:
      - name: vault-secrets
        emptyDir:
          medium: Memory   # secrets ficam apenas em RAM, não em disco