name: Auto PR to Main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Skip the no-op runs caused by main->develop sync merges: only open a PR
      # when develop actually has commits ahead of main.
      - name: Check develop is ahead of main
        id: diff
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "develop is $AHEAD commit(s) ahead of main"

      - name: Create Pull Request
        if: steps.diff.outputs.ahead != '0'
        uses: repo-sync/pull-request@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: develop
          destination_branch: main
          pr_title: "Merge develop into main"
          pr_body: |
            Automated PR to merge develop into main.

            **Triggered by:** ${{ github.actor }}
            **Commit:** ${{ github.sha }}
          pr_label: "automated-pr,release"
          pr_allow_empty: false