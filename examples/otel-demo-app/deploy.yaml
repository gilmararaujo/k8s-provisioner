apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-demo
  namespace: otel-demo
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-demo-traffic
  namespace: otel-demo
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo
  namespace: otel-demo
  labels:
    app: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-demo
  template:
    metadata:
      labels:
        app: otel-demo
    spec:
      serviceAccountName: otel-demo
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: otel-demo
        image: docker.io/gadocker/otel-demo:latest
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: SERVICE_NAME
          value: otel-demo
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.monitoring.svc:4317
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            memory: 32Mi
            cpu: 50m
          limits:
            memory: 64Mi
            cpu: 100m
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  selector:
    app: otel-demo
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
# Generates continuous traffic to produce traces and logs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-traffic
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-demo-traffic
  template:
    metadata:
      labels:
        app: otel-demo-traffic
    spec:
      serviceAccountName: otel-demo-traffic
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: traffic
        image: curlimages/curl:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        command: ["sh", "-c", "while true; do curl -s http://otel-demo.otel-demo.svc:8080/ping > /dev/null; sleep 1; done"]
        resources:
          requests:
            memory: 16Mi
            cpu: 10m
          limits:
            memory: 32Mi
            cpu: 50m
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: otel-demo-gateway
  namespace: otel-demo
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - otel-demo.local
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: lab-tls-secret
    hosts:
    - otel-demo.local
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  hosts:
  - otel-demo.local
  gateways:
  - otel-demo-gateway
  http:
  - route:
    - destination:
        host: otel-demo.otel-demo.svc.cluster.local
        port:
          number: 8080
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  host: otel-demo.otel-demo.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s