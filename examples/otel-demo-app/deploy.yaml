apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo
  namespace: default
  labels:
    app: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-demo
  template:
    metadata:
      labels:
        app: otel-demo
    spec:
      containers:
      - name: otel-demo
        image: YOUR_DOCKERHUB_USER/otel-demo:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          value: otel-demo
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: otel-collector.monitoring.svc:4317
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: 32Mi
            cpu: 50m
          limits:
            memory: 64Mi
            cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo
  namespace: default
spec:
  selector:
    app: otel-demo
  ports:
  - port: 8080
    targetPort: 8080
---
# Generates continuous traffic to produce traces and logs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-traffic
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-demo-traffic
  template:
    metadata:
      labels:
        app: otel-demo-traffic
    spec:
      containers:
      - name: traffic
        image: curlimages/curl:latest
        command: ["sh", "-c", "while true; do curl -s http://otel-demo:8080/ping > /dev/null; sleep 1; done"]
        resources:
          requests:
            memory: 16Mi
            cpu: 10m
          limits:
            memory: 32Mi
            cpu: 50m